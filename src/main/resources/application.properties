# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# -----------------------------
# Logging
# -----------------------------
# Application code — full detail
logging.level.harvestLog=INFO
# Only show INSERT/UPDATE/DELETE, suppress SELECT noise
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.engine=WARN
# Suppress Spring/framework internals
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN

# -----------------------------
# Hikari Connection Pool
# -----------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# -----------------------------
# Mail (SMTP)
# -----------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# -----------------------------
# App
# -----------------------------
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.admin.email=${ADMIN_EMAIL:topcroplog@gmail.com}

